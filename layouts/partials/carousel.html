{{- /*
  Center-mode carousel (driven by assets/js/carousel.js).
  dict: items (slice of {thumb,avif,webp,ar,title,meta}), color (accent hex),
        limit (optional max number of slides).
*/ -}}
{{- $items := .items -}}
{{- with .limit }}{{ $items = first . $items }}{{ end -}}
<div class="carousel" data-carousel data-color="{{ .color }}" style="--tint:{{ .color }}">
  <button class="carousel-arrow carousel-prev" type="button" aria-label="Previous">←</button>
  <div class="carousel-track">
    {{- range $items }}
    <button class="carousel-slide" type="button" style="--ar:{{ .ar }}"
      data-lb data-avif="{{ .avif }}" data-webp="{{ .webp }}" data-title="{{ .title }}" data-meta="{{ .meta }}"{{ with .cam }} data-cam="{{ . }}"{{ end }}>
      <img src="{{ .thumb }}" loading="lazy" alt="{{ .title }}">
    </button>
    {{- end }}
  </div>
  <button class="carousel-arrow carousel-next" type="button" aria-label="Next">→</button>
</div>
